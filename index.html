<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuko Wordlog (Firebase UID不要)</title>

  <style>
    :root{
      --gameW: 390px;
      --gameH: 700px;

      --dropletFill: rgba(255,255,255,.85);
      --dropletAlpha: .78;

      --quizTextColor: #111;
      --quizFrameColor: #111;
      --quizTimerColor: #111;
      --quizTimerBg: rgba(0,0,0,.12);

      --okA: #2EBC00;
      --okB: #7DEB24;
      --okText: #0b4a1d;

      --ngA: #FF81A8;
      --ngB: #FF9BB9;
      --ngText: #5a0000;

      --optBorder: rgba(0,0,0,.18);
      --optBg: rgba(255,255,255,.70);
    }

    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      margin:0; background:#f7f7fb; color:#111;
      transition: background .25s ease;
    }
    body.lesson-bg{ background:#D16D46; color:#fff; }
    body.quiz-bg{ background:#D1C1BB; color:#111; }

    header{display:none;}
    main{max-width:960px;margin:0 auto;padding:16px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,select,textarea,button{font-size:16px}
    input,select,textarea{padding:10px;border:1px solid #ccc;border-radius:12px;background:#fff}
    button{padding:10px 14px;border:0;border-radius:12px;background:#111;color:#fff;cursor:pointer}
    button.secondary{background:#5b6472}
    button.ghost{background:#fff;color:#111;border:1px solid #ccc}
    .card{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin:12px 0}
    .muted{opacity:.7;font-size:13px}
    .ok{color:#0a7a2f}
    .ng{color:#b00020}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:800px){.grid2{grid-template-columns:1fr}}

    .student-top{
      display:flex; flex-direction:column; gap:12px;
      max-width:360px;
      margin:28vh auto 0;
      padding:0;
      background:transparent;
      border:0;
      box-shadow:none;
    }
    .student-top input{
      width:100%;
      font-size:18px;
      padding:14px;
      border-radius:14px;
      text-align:center;
    }
    .student-top button{
      width:100%;
      padding:14px;
      border-radius:14px;
      font-weight:800;
    }
    .student-top input,
    .student-top button{ box-sizing:border-box; }

    #lessonListBox{ display:flex; flex-direction:column; align-items:center; }

    .lesson-stage{
      position:relative;
      width: min(var(--gameW), calc(100vw - 32px));
      height:min(var(--gameH), calc(100vh - 32px));
      margin: 0 auto;

      background:#FFCCCC;
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 18px 42px rgba(0,0,0,.55);
    }
    .lesson-svg{
      position:absolute; inset:0;
      width:100%; height:100%;
      display:block;
      touch-action:manipulation;
      user-select:none;
    }
    .lesson-hint{ max-width:720px;margin:10px auto 0;opacity:.75; color:#fff }

    .gear{
      position:fixed; right:16px; bottom:16px;
      width:54px; height:54px; border-radius:999px;
      background:#111; color:#fff;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 14px 30px rgba(0,0,0,.25);
      cursor:pointer; user-select:none; z-index:999;
    }
    .gear span{font-size:22px; line-height:1}

    .gradeFab{
      position:fixed;
      right:16px; bottom:16px;
      transform: translateX(-64px);
      display:flex; gap:8px;
      z-index:999;
      user-select:none;
      flex-wrap:wrap;
      max-width: 240px;
      justify-content:flex-end;
    }
    .gbtn{
      width:44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.14);
      color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
    }
    .gbtn.active{ background:#fff; color:#111; border-color:#fff; }
    .gbtn:disabled{ opacity:.35; cursor:default; box-shadow:none; }

    .modalBack{
      position:fixed; inset:0; background:rgba(0,0,0,.38);
      display:none; align-items:center; justify-content:center;
      z-index:1000; padding:16px;
    }
    .modal{
      width:min(520px, 100%);
      background:#fff; border-radius:18px; border:1px solid #eee;
      box-shadow:0 24px 70px rgba(0,0,0,.35);
      padding:16px;
    }
    .modal h3{margin:0 0 8px}
    .tiny{font-size:12px;opacity:.7}

    .quizStageWrap{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .quiz-stage{
      position:relative;
      width: min(var(--gameW), calc(100vw - 32px));
      height:min(var(--gameH), calc(100vh - 32px));
      margin: 0 auto;

      background:
        linear-gradient(0deg, rgba(255,255,255,0.95), rgba(255,255,255,0.75)),
        radial-gradient(1200px 700px at 30% 15%, rgba(255,255,255,0.06), transparent 60%),
        radial-gradient(900px 600px at 80% 40%, rgba(255,255,255,0.04), transparent 65%),
        linear-gradient(160deg, #8f5cff 0%, #6b5fd6 35%, #3a2a6f 100%);

      border: 2px solid var(--quizFrameColor);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 18px 42px rgba(0,0,0,.55);
      transition: none;
    }

    .quizProgressSvg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
      z-index:1;
    }

    .quizCenterWord{
      position:absolute;
      left:50%; top:42%;
      transform:translate(-50%,-50%);
      width: calc(100% - 40px);
      text-align:center;
      color: var(--quizTextColor);
      font-weight: 950;
      letter-spacing:.2px;
      font-size: 40px;
      line-height:1.15;
      text-shadow: 0 10px 28px rgba(0,0,0,.18);
      user-select:none;
      z-index:3;
    }

    .quizOptions{
      position:absolute;
      left:0; right:0;
      bottom:0;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:3;
    }

    .optBtn{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border: 1px solid var(--optBorder);
      background: var(--optBg);
      color: var(--quizTextColor);
      cursor:pointer;
      text-align:left;
      font-weight:900;
      backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      will-change: transform, filter;
      transition: transform .04s linear, filter .06s linear;
      touch-action: manipulation;
    }
    .optBtn:active{ transform: scale(0.99); }
    .optBtn:hover{ border-color: rgba(0,0,0,.30); background: rgba(255,255,255,.78); }
    .optBtn:disabled{ opacity: 1; cursor: default; }

    .optBtn.pending{
      filter: brightness(0.92) saturate(1.05);
      transform: scale(0.995);
    }

    .optBtn.goodGreen{
      border-color: var(--okA);
      background: linear-gradient(135deg, var(--okA), var(--okB));
      color: var(--okText);
      filter:none;
    }

    .optBtn.badRed{
      border-color: #c40000;
      background: linear-gradient(135deg, var(--ngA), var(--ngB));
      color: var(--ngText);
      filter:none;
    }

    @keyframes btnShakeFast{
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-7px); }
      30%  { transform: translateX(7px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    .optBtn.shake{ animation: btnShakeFast .18s linear both; }

    .quizHudHidden{ display:none !important; }

    .qTimer{
      position:fixed;
      right:16px; top:16px;
      width:44px; height:44px;
      z-index:1200;
      pointer-events:none;
      opacity:0.98;
    }
    .qTimer svg{width:100%;height:100%;display:block}
    .qTimer .bg{stroke: var(--quizTimerBg); fill:none; stroke-width:5}
    .qTimer .fg{stroke: var(--quizTimerColor); fill:none; stroke-width:5; stroke-linecap:round}
    .qTimer svg{
      transform: rotate(-90deg) scaleY(-1);
      transform-origin: 50% 50%;
    }

    .stageBadge{
      display:inline-block;
      font-weight:900;
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      background:#111;
      color:#fff;
      opacity:.9;
    }

    .stagePop{
      position:absolute;
      z-index:900;
      display:none;
      transform: translate(-50%, 0);
      background:rgba(255,255,255,.96);
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      box-shadow:0 18px 42px rgba(0,0,0,.28);
      padding:10px;
      backdrop-filter: blur(6px);
      min-width: unset;
      width: fit-content;
      max-width: min(92vw, 320px);
    }
    .stagePop .title{
      font-weight:900;
      color:#111;
      font-size:13px;
      margin-bottom:8px;
      text-align:center;
      opacity:.85;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 100%;
    }
    .stagePop .btnRow{
      display:grid;
      gap:10px;
      width: max-content;
      max-width: 100%;
    }
    .stagePop .sbtn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content: flex-start;
      gap:10px;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid #ddd;
      background:#fff;
      color:#111;
      font-weight:950;
      cursor:pointer;
      min-width: 0;
    }
    .stagePop .sbtn:hover{ border-color:#999; }
    .stagePop .sbtn.pre1{ background:#f6f8ff; }
    .stagePop .sbtn.pre2{ background:#f6fff8; }
    .stagePop .sbtn.review{ background:#fff7f6; }
    .stagePop .sbtn:disabled{ opacity:.35; cursor:default; }

    .sbtn .label{
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }
    .sbtn .icon{
      font-size:18px;
      line-height:1;
      transform: translateY(1px);
    }

    .dots5{
      position:relative;
      width:22px;
      height:22px;
      flex:0 0 22px;
      opacity:.95;
    }
    .dots5 i{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:999px;
      background:#111;
      box-shadow: 0 2px 6px rgba(0,0,0,.18);
    }
    .dots5 i:nth-child(1){ left:24px; top:2px; }
    .dots5 i:nth-child(2){ left:6px; top:5px; }
    .dots5 i:nth-child(3){ left:15px; top:7px; }
    .dots5 i:nth-child(4){ left:22px; top:12px; }
    .dots5 i:nth-child(5){ left:10px; top:14px; }

    .dropletLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
    }
    .droplet{
      position:absolute;
      left:50%;
      top:0%;
      width:46px;
      height:60px;
      transform: translateX(-50%) scale(1);
      opacity:0;
      filter:none;
      will-change: transform, opacity;
    }
    .droplet::before{
      content:"";
      position:absolute;
      inset:0;
      background: var(--dropletFill);
      opacity: var(--dropletAlpha);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      clip-path: path("M 23 0 C 33 12 44 24 44 37 C 44 52 35 60 23 60 C 11 60 2 52 2 37 C 2 24 13 12 23 0 Z");
      backdrop-filter: blur(6px);
    }

    #sessionBack .modal{
      position:relative;
      width:min(520px, 100%);
      background:#fff;
      border-radius:18px;
      border:1px solid #eee;
      box-shadow:0 24px 70px rgba(0,0,0,.35);
      padding:18px 16px 56px;
    }
    .sessionCenter{
      text-align:center;
      font-weight:950;
      color:#111;
      letter-spacing:.2px;
      line-height:1.25;
      user-select:none;
    }
    .sessionCenter .line1{ font-size:26px; }
    .sessionCenter .line2{ font-size:34px; margin-top:6px; }
    .sessionCenter .line3{ font-size:18px; margin-top:10px; opacity:.95; text-align:left; font-weight:900; }

    .sessionWrongList{
      margin:14px 0 0;
      padding:0;
      list-style:none;
      max-height:42vh;
      overflow:auto;
      border:1px solid #eee;
      border-radius:14px;
      text-align:left;
    }
    .sessionWrongList li{
      padding:10px 12px;
      border-top:1px solid #eee;
      display:flex;
      gap:10px;
      align-items:flex-start;
    }
    .sessionWrongList li:first-child{ border-top:0; }
    .sessionWrongList .w{ font-weight:950; min-width:120px; }
    .sessionWrongList .m{ opacity:.9; }

    .sessionBackBtn{
      position:absolute;
      right:12px;
      bottom:12px;
      padding:10px 14px;
      border-radius:12px;
      border:0;
      background:#111;
      color:#fff;
      font-weight:950;
      cursor:pointer;
    }
    .sessionBackBtn:active{ transform:scale(.99); }

    /* ===== 教師ページの表 ===== */
    .tableWrap{
      width:100%;
      overflow:auto;
      border:1px solid #eee;
      border-radius:14px;
      background:#fff;
    }
    table{
      border-collapse:collapse;
      width:max(820px,100%);
      font-size:13px;
    }
    th,td{
      border-bottom:1px solid #eee;
      padding:8px 10px;
      text-align:left;
      white-space:nowrap;
    }
    th{ background:#fafafa; font-weight:900; }
    tr:hover td{ background:#fcfcff; }
    .right{ text-align:right; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>

<body>
<main>
  <section id="studentSec">
    <div class="student-top" id="studentTop">
      <input id="stuName" placeholder="Enter name" />
      <button id="btnStart">スタート</button>
      <div id="stuStatus" class="muted" style="text-align:center"></div>
      <div id="netWarn" class="muted" style="text-align:center;display:none;color:#b00020;font-weight:800"></div>
    </div>

    <div id="lessonListBox" style="display:none">
      <div class="lesson-stage" id="lessonList">
        <svg class="lesson-svg" id="lessonSvg" aria-label="lesson menu"></svg>

        <div class="stagePop" id="stagePop" aria-label="stage chooser">
          <div class="title" id="stagePopTitle">課</div>
          <div class="btnRow">
            <button class="sbtn pre1"   id="btnStagePre1"   type="button">
              <span class="label">単語1 <span class="icon">💧</span></span>
              <span></span>
            </button>
            <button class="sbtn pre2"   id="btnStagePre2"   type="button">
              <span class="label">単語2 <span class="icon">💧</span></span>
              <span></span>
            </button>
            <button class="sbtn review" id="btnStageReview" type="button">
              <span class="label">復習</span>
              <span class="dots5" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
            </button>
          </div>
        </div>
      </div>
      <div class="muted lesson-hint" style="display:none">
        課を押すとクイズが始まります。（学年は右下で切替）
      </div>
    </div>

    <div id="quizBox" style="display:none; margin: 0 auto; padding-top: 0;">
      <div class="quizHudHidden">
        <span class="muted" id="lessonInfo" style="font-weight:900;opacity:.9"></span>
        <span class="stageBadge" id="stageBadge" style="display:none"></span>
        <div class="muted" id="quizResult"></div>
        <button id="btnLessonComplete" class="secondary">この段階を完了</button>
        <button id="btnBackLessons" class="ghost">戻る</button>
      </div>

      <div class="quizStageWrap">
        <div class="quiz-stage" id="quizStage" aria-label="quiz stage">
          <svg class="quizProgressSvg" id="quizProgressSvg" aria-hidden="true"></svg>
          <div class="dropletLayer" id="dropletLayer" aria-hidden="true"></div>
          <div class="quizCenterWord" id="quizWord">…</div>
          <div class="quizOptions" id="optGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ✅ 教師（毎回パスワード要求・保存しない・ページ内にパスワード文字列を出さない） -->
  <section id="adminSec" class="card" style="display:none">
    <h2 style="margin:0 0 10px">教師ページ</h2>

    <div class="card" style="margin:0 0 12px">
      <div class="row" style="justify-content:space-between">
        <div class="muted" id="adminStatus"></div>
        <button id="btnLogoutAdmin" class="ghost">教師ページを終了</button>
      </div>
    </div>

    <div class="grid2">
      <div class="card" style="margin:0">
        <div style="font-weight:800;margin-bottom:8px">単語登録（学年/課/段階/クラス）</div>
        <div class="row">
          <select id="gradeSel"></select>
          <input id="lessonSel" placeholder="課（例：1課 / L1）" style="min-width:150px" />
          <select id="stageSel">
            <option value="pre1">pre1</option>
            <option value="pre2">pre2</option>
            <option value="review">review</option>
          </select>
          <input id="classSel" placeholder="クラス（任意：名詞/動詞など）" style="min-width:220px" />
        </div>
        <div class="muted" style="margin-top:6px">
          1行：<b>word,meaning,wrong1,wrong2[,wrong3,wrong4,wrong5]</b>
        </div>
      </div>

      <div class="card" style="margin:0">
        <div style="font-weight:900;margin-bottom:8px">学生名簿（DBの students）</div>
        <button id="btnLoadStudents" class="secondary">学生一覧を読み込み</button>
        <div id="studentList" class="muted" style="margin-top:10px;white-space:pre-wrap"></div>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:8px">単語リスト入力（誤答2〜5）</div>
      <textarea id="wordsText" rows="10" style="width:100%"
        placeholder="apple,りんご,みかん,ぶどう&#10;dog,犬,猫,鳥,魚,馬"></textarea>
      <div class="row" style="margin-top:10px">
        <button id="btnUploadWords">登録</button>
        <button id="btnPreviewParse" class="ghost">プレビュー</button>
        <span id="uploadStatus" class="muted"></span>
      </div>
      <div id="parsePreview" class="muted" style="margin-top:8px;white-space:pre-wrap"></div>
    </div>

    <!-- ✅ 学年別 進捗（課ごと + 全体pre1+pre2） -->
    <div class="card">
      <div style="font-weight:900;margin-bottom:8px">学年別 進捗一覧</div>
      <div class="row">
        <select id="reportGradeSel"></select>
        <button id="btnLoadReport" class="secondary">この学年の進捗を表示</button>
        <span id="reportStatus" class="muted"></span>
      </div>

      <div class="muted" style="margin-top:10px">
        表示：<b>学生名</b> / <b>課</b> / <b>pre1%</b> / <b>pre2%</b> / <b>review%</b> / <b>pre1+pre2(全体%)</b>
      </div>

      <div id="reportSummary" class="muted" style="margin-top:10px"></div>

      <div class="tableWrap" style="margin-top:10px">
        <div id="reportTable"></div>
      </div>
    </div>
  </section>
</main>

<div class="gradeFab" id="gradeFab" aria-label="grade selector" style="display:none"></div>
<div class="gear" id="gearBtn" title="管理者"><span id="gearIcon">⚙</span></div>

<div class="modalBack" id="sessionBack" aria-label="session result">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="sessionCenter">
      <div class="line1">結果！</div>
      <div class="line2" id="sessionPct">--%</div>
      <div class="line3">間違えた単語</div>
    </div>
    <ul class="sessionWrongList" id="wrongList"></ul>
    <button id="btnSessionClose" class="sessionBackBtn" type="button">戻る</button>
  </div>
</div>

<div class="qTimer" id="qTimer" style="display:none" aria-label="question timer">
  <svg viewBox="0 0 44 44">
    <circle class="bg" cx="22" cy="22" r="18"></circle>
    <circle class="fg" id="qTimerFg" cx="22" cy="22" r="18"></circle>
  </svg>
</div>

<script type="module">
  /* =========================
     ✅ Firebase（UID不要運用）
  ========================= */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getDatabase, ref, get, set, update, push, runTransaction
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  /* ========= Firebase設定（ここをあなたのに差し替え） ========= */
  const firebaseConfig = {
    apiKey: "AIzaSyARne6Jb4ePPe7vbvLryE_P-jZ2umI3LFc",
    authDomain: "kakapo-8d297.firebaseapp.com",
    databaseURL: "https://kakapo-8d297-default-rtdb.firebaseio.com",
    projectId: "kakapo-8d297",
    storageBucket: "kakapo-8d297.firebasestorage.app",
    messagingSenderId: "702767130857",
    appId: "1:702767130857:web:54472c8d5ea09bd3cf6878"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  /* =========================
     ★ 設定
  ========================= */
  const MAX_GRADE = 4;
  const QT_MS = 4000;

  /* =========================
     ✅ 教師ページ（重要）
     - 毎回プロンプトで入力させる

  /* =========================
     ✅ lessons集計
  ========================= */
  async function refreshLessons(){
    const grade = SELECTED_GRADE;
    const sk = STUDENT.studentKey;

    const wordsGrade = await dbGet(P.wordsGrade(grade));
    const lessonKeys = wordsGrade && typeof wordsGrade === "object"
      ? Object.keys(wordsGrade).map(normLesson).filter(Boolean)
      : [];

    const progressGrade = await dbGet(`progress/${sk}/${grade}`) || {};
    const doneGrade = await dbGet(`lessonProgress/${sk}/${grade}`) || {};

    const tiles = [];
    for (const lesson of lessonKeys){
      const wLesson = wordsGrade?.[lesson] || {};
      const total = { pre1:0, pre2:0, review:0 };
      for (const st of ["pre1","pre2","review"]){
        const stObj = wLesson?.[st] || {};
        total[st] = (stObj && typeof stObj === "object") ? Object.keys(stObj).length : 0;
      }

      const pLesson = progressGrade?.[lesson] || {};
      const mastered = { pre1:0, pre2:0, review:0 };

      for (const st of ["pre1","pre2","review"]){
        const pStage = pLesson?.[st] || {};
        if (pStage && typeof pStage === "object"){
          for (const wid of Object.keys(pStage)){
            const v = pStage[wid];
            if (v && v.mastered === true) mastered[st] += 1;
          }
        }
      }

      const r = (a,b)=> (b>0 ? clamp(a/b,0,1) : 0);
      const pre1Rate = r(mastered.pre1, total.pre1);
      const pre2Rate = r(mastered.pre2, total.pre2);
      const reviewRate = r(mastered.review, total.review);
      const sumTotal = (total.pre1 + total.pre2);
      const sumDone  = (mastered.pre1 + mastered.pre2);
      const achieveRate = sumTotal>0 ? clamp(sumDone/sumTotal,0,1) : 0;

      const stageDone = {
        pre1: doneGrade?.[lesson]?.pre1?.completedAt || null,
        pre2: doneGrade?.[lesson]?.pre2?.completedAt || null,
        review: doneGrade?.[lesson]?.review?.completedAt || null
      };

      tiles.push({
        lesson,
        achieveRate,
        stageDone,
        stageStats: {
          pre1:{ rate: pre1Rate, mastered: mastered.pre1, total: total.pre1 },
          pre2:{ rate: pre2Rate, mastered: mastered.pre2, total: total.pre2 },
          review:{ rate: reviewRate, mastered: mastered.review, total: total.review },
          sum_pre1_pre2:{ rate: achieveRate }
        }
      });
    }

    tiles.sort((a,b)=>{
      const ax = parseFloat(String(a.lesson).replace(/[^\d.]/g,"")) || 9999;
      const bx = parseFloat(String(b.lesson).replace(/[^\d.]/g,"")) || 9999;
      return ax - bx;
    });

    _lastLessonTiles = tiles;
    drawLessonTrapezoids();
  }

  async function loadStagePool(grade, lesson, stage){
    const sk = STUDENT.studentKey;
    const wordsObj = await dbGet(P.wordsStage(grade, lesson, stage)) || {};
    const progObj  = await dbGet(P.progressStage(sk, grade, lesson, stage)) || {};

    const words = [];
    if (wordsObj && typeof wordsObj === "object"){
      for (const wid of Object.keys(wordsObj)){
        const v = wordsObj[wid];
        if (!v) continue;
        const word = String(v.word ?? "").trim();
        const meaning = String(v.meaning ?? "").trim();
        const wrongs = Array.isArray(v.wrongs) ? v.wrongs.map(x=>String(x).trim()).filter(Boolean) : [];
        if (!word || !meaning || wrongs.length < 2) continue;
        words.push({ id: wid, word, meaning, wrongs });
      }
    }
    return { grade, lesson, stage, words, progress: progObj || {} };
  }

  function pickNextWord(){
    if (!STAGE_POOL || !STAGE_POOL.words.length) return null;

    const words = STAGE_POOL.words;
    const prog  = STAGE_POOL.progress || {};
    const notMastered = words.filter(w => !(prog?.[w.id]?.mastered === true));
    const pool = notMastered.length ? notMastered : words;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  async function submitAnswer(chosen, chosenBtnEl){
    if (ANSWERING) return;
    if (!CURRENT.currentQ) return;
    if (sessionBack.style.display === "flex") return;

    ANSWERING = true;
    stopQuestionTimer();

    const btns = [...optGrid.querySelectorAll(".optBtn")];
    btns.forEach(b=>{
      b.disabled = true;
      b.classList.remove("pending","goodGreen","badRed","shake");
    });
    if (chosenBtnEl) chosenBtnEl.classList.add("pending");
    await new Promise(r=>requestAnimationFrame(r));

    try{
      const correct = CURRENT.currentQ.correct;
      const isCorrect = (String(chosen) === String(correct));

      if (chosenBtnEl) chosenBtnEl.classList.remove("pending");

      if (isCorrect){
        btns.forEach(b=>{ if (b.textContent === correct) b.classList.add("goodGreen"); });
        spawnDroplets();
      } else {
        let chosenBtn = null;
        btns.forEach(b=>{
          if (b.textContent === correct) b.classList.add("goodGreen");
          if (b.textContent === chosen){
            b.classList.add("badRed");
            chosenBtn = b;
          }
        });
        if (chosenBtn){
          chosenBtn.classList.remove("shake");
          void chosenBtn.offsetWidth;
          chosenBtn.classList.add("shake");
        }
      }

      await updateProgress(isCorrect, chosen, correct);

      if (SESSION){
        SESSION.asked += 1;
        if (isCorrect) SESSION.correct += 1;
        else SESSION.wrongs.push({ word: CURRENT.currentQ.word, meaning: correct });
      }

      if (STAGE_POOL){
        const wid = CURRENT.currentQ.word_id;
        const cur = STAGE_POOL.progress?.[wid] || {};
        STAGE_POOL.progress[wid] = { ...cur, mastered: (isCorrect ? true : (cur.mastered===true)) };
      }

      refreshLessons().catch(()=>{});
      setTimeout(()=> nextQuestion(true), 260);

    } catch(e){
      setResult("保存に失敗しました（DBルール/ネット制限の可能性）", false);
      netWarn.style.display = "";
      netWarn.textContent = "保存失敗：DBルールが厳しい or ネット制限。Realtime DBルールをまず .read/.write true にして検証して。";
      btns.forEach(b=>b.disabled = false);
    } finally {
      ANSWERING = false;
    }
  }

  async function updateProgress(isCorrect, chosen, correct){
    const sk = STUDENT.studentKey;
    const g = SELECTED_GRADE;
    const lesson = CURRENT.lesson;
    const stage = CURRENT.stage;
    const wid = CURRENT.currentQ.word_id;
    const path = P.progressWord(sk, g, lesson, stage, wid);

    await runTransaction(ref(db, path), (cur)=>{
      const now = nowTs();
      const base = (cur && typeof cur === "object") ? cur : {
        correctCount: 0,
        wrongCount: 0,
        mastered: false,
        lastAt: 0
      };
      if (isCorrect) base.correctCount = (base.correctCount||0) + 1;
      else base.wrongCount = (base.wrongCount||0) + 1;
      base.lastAt = now;

  function makeWavePath(x, y, w, h, levelY, phase, amp, wavelength){
    const top = y;
    const bottom = y + h;

    const PAD = 3;
    levelY = clamp(levelY, top + PAD, bottom - PAD);

    const UP_FACTOR   = 0.28;
    const DOWN_FACTOR = 1.00;

    const upRoom = levelY - (top + PAD);
    const downRoom = (bottom - PAD) - levelY;

    const AmaxByUp = upRoom / UP_FACTOR;
    const AmaxByDown = downRoom / DOWN_FACTOR;

    let A = Math.min(amp, AmaxByUp, AmaxByDown);

    const MIN_A = 1.0;
    const minPossible = Math.min(AmaxByUp, AmaxByDown);
    if (minPossible > 0){
      A = Math.max(Math.min(MIN_A, minPossible), A);
    } else {
      A = 0;
    }

    const wl = Math.max(28, wavelength);
    const k = (2 * Math.PI) / wl;

    const steps = clamp(Math.round(w / (wl / 8)), 18, 60);
    const bias = A * 0.22;

    const pts = [];
    for (let i=0;i<=steps;i++){
      const xx = x + (w * i / steps);
      const s = Math.sin(k * (xx - x) + phase);
      const yy = levelY + s * A - bias;
      pts.push([xx, yy]);
    }

    let d = `M ${x} ${bottom} L ${x} ${levelY}`;
    d += ` L ${pts[0][0]} ${pts[0][1]}`;

    for (let i=1;i<pts.length;i++){
      const [x0,y0] = pts[i-1];
      const [x1,y1] = pts[i];
      const mx = (x0 + x1) / 2;
      const my = (y0 + y1) / 2;
      d += ` Q ${x0} ${y0} ${mx} ${my}`;
    }

    const last = pts[pts.length-1];
    d += ` T ${last[0]} ${last[1]}`;

    d += ` L ${x+w} ${bottom} Z`;
    return d;
  }

  function ensureWaveLoop(){

  function drawLessonTrapezoids(){

    lessonSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);

    if (tiles.length === 0){

      t.textContent = "単語が未登録です（教師で登録）";

      return;

    const lineCount = 3;
    const base = {
      marginX: 20,
      lineH: 12,
      trapTopW: 96,
      trapBottomW: 62,
      trapH: 112,
      trapGapX: 18,
      strokeW: 2
    };
    const strokeColor = "#000";
    const padY = 160;

    const marginX = base.marginX;
    const lineW = Math.max(0, W - marginX * 2);
    const perLine = 3;

    const maxShow = lineCount * perLine;
    const shown = tiles.slice(0, maxShow);

    const firstLineY = padY;
    const lastLineY  = Math.max(firstLineY, H - padY);
    const lineGapY   = (lineCount <= 1) ? 0 : (lastLineY - firstLineY) / (lineCount - 1);

    const trapTopW = base.trapTopW;
    const trapBottomW = base.trapBottomW;
    const trapH = base.trapH;

    function computeGap(rowCount){
      if (rowCount <= 1) return 0;
      const raw = (lineW - rowCount * trapTopW) / (rowCount - 1);
      return clamp(raw, 8, base.trapGapX);
    }

    const defs = sEl("defs");
    lessonSvg.appendChild(defs);

    const GAUGE_MAX = 0.90;

    for (let i = 0; i < lineCount; i++) {
      const lineY = Math.max(0, firstLineY + i * lineGapY);

      const line = sEl("rect");
      line.setAttribute("x", marginX);
      line.setAttribute("y", lineY);
      line.setAttribute("width", lineW);
      line.setAttribute("height", base.lineH);
      line.setAttribute("fill", strokeColor);
      lessonSvg.appendChild(line);

      const startIdx = i * perLine;
      const endIdx = Math.min(shown.length, startIdx + perLine);
      const rowCount = endIdx - startIdx;
      if (rowCount <= 0) continue;

      const trapGapX = computeGap(rowCount);
      const totalTrapW = rowCount * trapTopW + (rowCount - 1) * trapGapX;
      const startX = marginX + Math.max(0, (lineW - totalTrapW) / 2);

      for (let j = 0; j < rowCount; j++) {
        const t = shown[startIdx + j];
        const lessonKey = normLesson(t.lesson);

        const cx = startX + j * (trapTopW + trapGapX) + trapTopW / 2;

        const bottomY = lineY;
        const topMargin = 24;
        const safeTrapH = Math.min(trapH, Math.max(10, bottomY - topMargin));
        const topY = bottomY - safeTrapH;

        const x1 = cx - trapTopW/2,  y1 = topY;
        const x2 = cx + trapTopW/2,  y2 = topY;
        const x3 = cx + trapBottomW/2, y3 = bottomY;
        const x4 = cx - trapBottomW/2, y4 = bottomY;
        const points = `${x1},${y1} ${x2},${y2} ${x3},${y3} ${x4},${y4}`;

        const hit = sEl("polygon");
        hit.setAttribute("points", points);
        hit.setAttribute("fill", "transparent");
        hit.style.cursor = "pointer";
        hit.addEventListener("click", (ev)=>{
          const listRect = lessonList.getBoundingClientRect();
          const lx = ev.clientX - listRect.left;
          const ly = ev.clientY - listRect.top;
          openStagePop(lessonKey, t, lx, ly + 10);
          ev.stopPropagation();
        });
        lessonSvg.appendChild(hit);

        const trapClipId = `trapclip_${i}_${j}`;
        const trapClip = sEl("clipPath");
        trapClip.setAttribute("id", trapClipId);
        const trapClipPoly = sEl("polygon");
        trapClipPoly.setAttribute("points", points);
        trapClip.appendChild(trapClipPoly);
        defs.appendChild(trapClip);

        const waveBox = { x:x1, y:topY, w:(x2-x1), h:safeTrapH };

        let rate = Number(t.achieveRate);
        if (!Number.isFinite(rate)) rate = 0;
        rate = clamp(rate, 0, 1);

        const levelY_raw = bottomY - (waveBox.h * (GAUGE_MAX * rate));
        const LEVEL_PAD = 2;
        const levelY = clamp(levelY_raw, topY + LEVEL_PAD, bottomY - LEVEL_PAD);

        const visY = levelY;
        const visH = bottomY - levelY;

        const visClipId = `visclip_${i}_${j}`;
        const visClip = sEl("clipPath");
        visClip.setAttribute("id", visClipId);
        const visRect = sEl("rect");
        visRect.setAttribute("x", waveBox.x - 2);
        visRect.setAttribute("y", visY);
        visRect.setAttribute("width", waveBox.w + 4);
        visRect.setAttribute("height", visH);
        visClip.appendChild(visRect);
        defs.appendChild(visClip);

        const gWave = sEl("g");
        gWave.setAttribute("clip-path", `url(#${trapClipId})`);
        lessonSvg.appendChild(gWave);

        const wavePath = sEl("path");
        wavePath.setAttribute("fill", "#111");
        wavePath.setAttribute("opacity", String(GAUGE_ALPHA));
        wavePath.setAttribute("clip-path", `url(#${visClipId})`);
        wavePath.style.pointerEvents = "none";
        gWave.appendChild(wavePath);

        _tileRefs.set(lessonKey, { wavePath, waveBox, levelY });

        const imgW = trapTopW * 0.65;
        const imgH = safeTrapH * 0.7;
        const imgX = cx - imgW/2;
        const imgY = topY + (safeTrapH - imgH) * 0.40;

        const img = sEl("image");
        img.setAttribute("href", "kame.png");
        img.setAttribute("x", imgX);
        img.setAttribute("y", imgY);
        img.setAttribute("width", imgW);
        img.setAttribute("height", imgH);
        img.setAttribute("preserveAspectRatio", "xMidYMid meet");
        img.setAttribute("clip-path", `url(#${trapClipId})`);
        img.setAttribute("opacity", "0.55");
        img.style.pointerEvents = "none";
        lessonSvg.appendChild(img);

        const outline = sEl("path");
        const dOutline = `M ${x1} ${y1} L ${x4} ${y4} L ${x3} ${y3} L ${x2} ${y2}`;
        outline.setAttribute("d", dOutline);
        outline.setAttribute("fill", "none");
        outline.setAttribute("stroke", strokeColor);
        outline.setAttribute("stroke-width", base.strokeW);
        outline.setAttribute("stroke-linecap", "round");
        outline.setAttribute("stroke-linejoin", "round");
        outline.style.pointerEvents = "none";
        lessonSvg.appendChild(outline);

        const labelY = topY + safeTrapH*0.36;
        const label = sEl("text");
        label.setAttribute("x", cx);
        label.setAttribute("y", labelY);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("dominant-baseline", "middle");

        label.setAttribute("fill", "#111");

        label.textContent = lessonKey;
        lessonSvg.appendChild(label);

        const ss = t.stageStats || {};
        const dbg = sEl("text");
        dbg.setAttribute("x", cx);
        dbg.setAttribute("y", labelY + 16);
        dbg.setAttribute("text-anchor", "middle");

        dbg.setAttribute("clip-path", `url(#${trapClipId})`);
        lessonSvg.appendChild(dbg);
      }
    }

    ensureWaveLoop();
  }

      const levelY = H - (H * (GAUGE_MAX * _quizRateVis));
      const amp = Math.max(0.8, H * 0.010);

  function spawnDroplets(){
    if (!dropletLayer) return;
    const kids = dropletLayer.querySelectorAll(".droplet");
    if (kids.length > 18) dropletLayer.innerHTML = "";

    function waveYAtCenter(){
      const { W, levelY, phase, amp, wl } = _quizWaveState || {};
      if (!(W > 0) || !(wl > 0) || !(levelY > 0)) return Infinity;
      const k = (2 * Math.PI) / wl;
      const x = W * 0.5;
      const bias = (amp || 0) * 0.22;
      return levelY + Math.sin(k * x + phase) * (amp || 0) - bias;
    }

    function makeOne(delayMs){
      setTimeout(()=>{
        const d = document.createElement("div");
        d.className = "droplet";
        dropletLayer.appendChild(d);

        const start = performance.now();
        const dur = 1200;
        const dropletH = 60;
        const stageH = (dropletLayer.getBoundingClientRect().height) || (_quizWaveState.H || 0);
        const fromY = -dropletH - 10;
        const toY   = stageH + dropletH + 10;
        const easeOut = (t)=> 1 - Math.pow(1 - t, 3);

        function tick(now){
          const t = (now - start) / dur;
          if (t >= 1){ d.remove(); return; }

          const p = easeOut(Math.max(0, Math.min(1, t)));
          const y = fromY + (toY - fromY) * p;

          let op = 0;
          if (t < 0.10) op = t / 0.10;
          else op = 1;

          const dropletCenterY = y + dropletH / 2;
          const wy = waveYAtCenter();
          if (dropletCenterY >= wy){ d.remove(); return; }

          d.style.opacity = String(op);
          d.style.transform = `translateX(-50%) translateY(${y}px) scale(${0.92 + 0.10*p})`;
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }, delayMs);
    }

    makeOne(0); makeOne(220); makeOne(440);
  }

  function parseWordsWithWrongs(text){
    const lines = text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const items = [];
    const bads = [];
    for (let i=0;i<lines.length;i++){
      const line = lines[i];
      const parts = line.split(",").map(s=>s.trim());
      const word = (parts[0]||"").trim();
      const meaning = (parts[1]||"").trim();
      const wrongs = parts.slice(2).map(x=>String(x||"").trim()).filter(Boolean);
      if (!word || !meaning || wrongs.length < 2 || wrongs.length > 5){
        bads.push({ line:i+1, raw: line });
        continue;
      }
      items.push({ word, meaning, wrongs });
    }
    return { items, bads };
  }

  function lessonNumKey(lesson){
    const n = parseFloat(String(lesson).replace(/[^\d.]/g,""));
    return Number.isFinite(n) ? n : 9999;
  }

  function countMasteredInStage(pStageObj){
    let c = 0;
    if (pStageObj && typeof pStageObj === "object"){
      for (const wid of Object.keys(pStageObj)){
        const v = pStageObj[wid];
        if (v && v.mastered === true) c++;
      }
    }
    return c;
  }

  function pct01(done, total){
    if (!(total > 0)) return 0;
    return clamp(done / total, 0, 1);
  }

  async function mapLimit(arr, limit, mapper){
    const out = [];
    let i = 0;
    const workers = new Array(Math.max(1, limit)).fill(0).map(async ()=>{
      while (i < arr.length){
        const idx = i++;
        out[idx] = await mapper(arr[idx], idx);
      }
    });
    await Promise.all(workers);
    return out;
  }

  async function loadTeacherReport(){

    const lessonKeys = (wordsGrade && typeof wordsGrade === "object")
      ? Object.keys(wordsGrade).map(normLesson).filter(Boolean)
      : [];

    lessonKeys.sort((a,b)=> lessonNumKey(a) - lessonNumKey(b));

    const totalsByLesson = {};
    for (const lesson of lessonKeys){
      const wLesson = wordsGrade?.[lesson] || {};
      const tot = { pre1:0, pre2:0, review:0 };
      for (const st of ["pre1","pre2","review"]){
        const stObj = wLesson?.[st] || {};
        tot[st] = (stObj && typeof stObj === "object") ? Object.keys(stObj).length : 0;
      }
      totalsByLesson[lesson] = tot;
    }

    const studentsObj = await dbGet("students") || {};
    const students = Object.keys(studentsObj).map(sk=>{
      const s = studentsObj[sk] || {};
      return {
        studentKey: sk,
        name: String(s.name ?? "").trim(),
        lastSeenAt: s.lastSeenAt || 0
      };
    }).filter(s=>s.name);

    students.sort((a,b)=>{
      const an = a.name.toLowerCase();
      const bn = b.name.toLowerCase();
      if (an < bn) return -1;
      if (an > bn) return 1;
      return (b.lastSeenAt||0) - (a.lastSeenAt||0);

    if (!lessonKeys.length){
      reportStatus.textContent = "この学年は words が未登録です";
      reportSummary.textContent = "";
      reportTable.innerHTML = "";
      return;
    }
    if (!students.length){
      reportStatus.textContent = "students が空です（まだ入室者がいない）";
      reportSummary.textContent = "";
      reportTable.innerHTML = "";
      return;
    }

    let gradeTotalPre12 = 0;
    for (const lesson of lessonKeys){
      const t = totalsByLesson[lesson];
      gradeTotalPre12 += (t.pre1 + t.pre2);
    }

    const results = await mapLimit(students, 8, async (stu)=>{
      const pg = await dbGet(`progress/${stu.studentKey}/${grade}`) || {};
      const rows = [];
      let sumDonePre12 = 0;

      for (const lesson of lessonKeys){
        const tot = totalsByLesson[lesson];
        const pLesson = pg?.[lesson] || {};
        const m1 = countMasteredInStage(pLesson?.pre1);
        const m2 = countMasteredInStage(pLesson?.pre2);
        const mr = countMasteredInStage(pLesson?.review);

        const r1 = pct01(m1, tot.pre1);
        const r2 = pct01(m2, tot.pre2);
        const rr = pct01(mr, tot.review);

        sumDonePre12 += (m1 + m2);

        const sumRate = pct01((m1 + m2), (tot.pre1 + tot.pre2));

        rows.push({
          studentName: stu.name,
          studentKey: stu.studentKey,
          lesson,
          pre1: r1,
          pre2: r2,
          review: rr,
          pre12: sumRate
        });
      }

      const overallPre12 = pct01(sumDonePre12, gradeTotalPre12);

      return {
        studentName: stu.name,
        studentKey: stu.studentKey,
        overallPre12,
        rows
      };
    });

    const summaryHtml = `
      <div style="font-weight:900;margin-bottom:6px">全体（${grade}年 / pre1+pre2）</div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>学生</th>
              <th class="right">pre1+pre2（全体%）</th>
              <th class="mono">key</th>
            </tr>
          </thead>
          <tbody>
            ${results.map(r=>`
              <tr>
                <td>${escapeHtml(r.studentName)}</td>
                <td class="right">${Math.round(r.overallPre12*100)}%</td>
                <td class="mono">${escapeHtml(r.studentKey)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
    reportSummary.innerHTML = summaryHtml;

    const allRows = results.flatMap(x=>x.rows);
    const detailHtml = `
      <table>
        <thead>
          <tr>
            <th>学生</th>
            <th>課</th>
            <th class="right">pre1%</th>
            <th class="right">pre2%</th>
            <th class="right">review%</th>
            <th class="right">pre1+pre2%</th>
          </tr>
        </thead>
        <tbody>
          ${allRows.map(r=>`
            <tr>
              <td>${escapeHtml(r.studentName)}</td>
              <td>${escapeHtml(r.lesson)}</td>
              <td class="right">${Math.round(r.pre1*100)}%</td>
              <td class="right">${Math.round(r.pre2*100)}%</td>
              <td class="right">${Math.round(r.review*100)}%</td>
              <td class="right">${Math.round(r.pre12*100)}%</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
    reportTable.innerHTML = detailHtml;

    reportStatus.textContent = `表示OK：${students.length}人 / ${lessonKeys.length}課`;
  }

  btnLoadReport.onclick = loadTeacherReport;
  reportGradeSel.onchange = ()=>{ loadTeacherReport().catch(()=>{}); };

  /* =========================
     ✅ 教師ページ：毎回パスワード要求（保存しない）
  ========================= */
  function toHex(bytes){
    return [...bytes].map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  async function sha256Hex(text){
    const enc = new TextEncoder();
    const buf = enc.encode(String(text ?? ""));
    const digest = await crypto.subtle.digest("SHA-256", buf);
    return toHex(new Uint8Array(digest));
  }

  async function enterAdminWithPassword(){
    if (!ENABLE_ADMIN){
      alert("この端末では教師ページは無効です。");
      return;
    }

    if (!window.crypto?.subtle){
      alert("このブラウザでは認証に必要な機能が使えません。");
      return;
    }

    // ✅ 毎回必ず聞く（保存しない）
    const inKey = prompt("教師ページに入るにはパスワードが必要です。入力してください。") || "";
    const token = String(inKey);

    try{
      const hex = await sha256Hex(token);
      if (hex !== ADMIN_SHA256){
        alert("認証失敗");
        ADMIN_OK = false;
        return;
      }
    } catch(e){
      alert("認証処理に失敗しました。");
      ADMIN_OK = false;
      return;
    }

    ADMIN_OK = true;
    adminStatus.textContent = "認証OK";
    reportGradeSel.value = String(SELECTED_GRADE);
    setMode(true);
    loadTeacherReport().catch(()=>{});
  }

  /* =========================
     ✅ 教師/戻るボタン（⚙）
  ========================= */
  gearBtn.onclick = async ()=>{
    // 生徒画面での「戻る」挙動は維持
    if (IN_ROOM){
      setStuStatus("", true);
      stopQuestionTimer();
      closeSessionResult();
      if (quizBox.style.display !== "none"){
        await showLessonList();
      } else {
        showNameScreen();
      }
      return;
    }

    // ここから教師ページ（毎回認証）
    await enterAdminWithPassword();
  };

  /* =========================
     ✅ 入室フロー
  ========================= */
  let STARTING = false;
  async function startFlow(){
    if (STARTING) return;
    STARTING = true;
    netWarn.style.display = "none";
    try{
      const name = normName(stuName.value);
      if (!name){ setStuStatus("名前を入力して。", false); return; }
      localStorage.setItem(NAME_KEY, name);

      setStuStatus("入室中…", true);
      STUDENT.name = name;
      await enterStudent(name);

      setStuStatus("入室OK（課を押してね）", true);
      await showLessonList();
    } catch(e){
      setStuStatus("入室失敗（DBルール/ネット制限）", false);
      netWarn.style.display = "";
      netWarn.textContent = "入室失敗：Realtime DBルールが厳しい or ネット制限。まず .read/.write true で検証して。";
    } finally {
      STARTING = false;
    }
  }
  btnStart.onclick = startFlow;
  stuName.addEventListener("keydown", (e)=>{ if (e.key === "Enter") startFlow(); });

  /* =========================
     ✅ 初期化
  ========================= */
  const savedName = localStorage.getItem(NAME_KEY);
  if (savedName) stuName.value = savedName;

  buildGradeButtons();
  buildAdminGradeSelect();
  renderGradeButtons();
  setMode(false);
  showNameScreen();

</script>
