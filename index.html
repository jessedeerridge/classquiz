<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuko Wordlog</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
  <script>
    // Firebaseの設定
    const firebaseConfig = {
      apiKey: "AIzaSyARne6Jb4ePPe7vbvLryE_P-jZ2umI3LFc",
      authDomain: "kakapo-8d297.firebaseapp.com",
      databaseURL: "https://kakapo-8d297-default-rtdb.firebaseio.com",
      projectId: "kakapo-8d297",
      storageBucket: "kakapo-8d297.firebasestorage.app",
      messagingSenderId: "702767130857",
      appId: "1:702767130857:web:54472c8d5ea09bd3cf6878",
      measurementId: "G-NXSRP1T826"
    };

    // Firebase初期化
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database(app);

    // DOM要素取得
    const stuName = document.getElementById("stuName");
    const btnStart = document.getElementById("btnStart");
    const stuStatus = document.getElementById("stuStatus");
    const lessonListBox = document.getElementById("lessonListBox");

    // 学生データ取得
    async function getStudentData(name) {
      const studentRef = db.ref('students/' + name);
      const snapshot = await studentRef.once('value');
      if (snapshot.exists()) {
        return { ok: true, data: snapshot.val() };
      } else {
        return { ok: false, error: '学生が見つかりません' };
      }
    }

    // レッスンデータ取得
    async function getLessonsData(name, grade) {
      const lessonsRef = db.ref(`students/${name}/lessons/${grade}`);
      const snapshot = await lessonsRef.once('value');
      if (snapshot.exists()) {
        return { ok: true, lessons: snapshot.val() };
      } else {
        return { ok: false, error: 'レッスンが見つかりません' };
      }
    }

    // 回答データ保存
    async function saveAnswer(name, word_id, chosen) {
      const answersRef = db.ref(`students/${name}/answers/${word_id}`);
      await answersRef.set({ chosen, timestamp: Date.now() });
      return { ok: true };
    }

    // レッスン完了保存
    async function saveLessonCompletion(name, grade, lesson, stage) {
      const lessonRef = db.ref(`students/${name}/lessons/${grade}/${lesson}/stages/${stage}`);
      await lessonRef.set({ completed_at: Date.now() });
      return { ok: true };
    }

    // 学生の名前を入力してレッスンを表示
    async function startFlow() {
      const name = stuName.value.trim();
      if (!name) {
        stuStatus.textContent = "名前を入力して。";
        return;
      }
      localStorage.setItem("yuko_wordlog_name", name);

      stuStatus.textContent = "入室中…";
      const studentData = await getStudentData(name);
      if (!studentData.ok) {
        stuStatus.textContent = `入室失敗：${studentData.error}`;
        return;
      }

      const lessonsData = await getLessonsData(name, 1);  // 学年は仮で1
      if (!lessonsData.ok) {
        stuStatus.textContent = `レッスン取得失敗：${lessonsData.error}`;
        return;
      }

      stuStatus.textContent = "入室OK（課を押してね）";
      showLessonList(lessonsData.lessons);
    }

    // レッスンリストを表示
    function showLessonList(lessons) {
      lessonListBox.style.display = "block";
      lessonListBox.innerHTML = "";
      lessons.forEach(lesson => {
        const lessonElement = document.createElement("div");
        lessonElement.textContent = lesson.name;
        lessonElement.addEventListener("click", () => startQuiz(lesson));
        lessonListBox.appendChild(lessonElement);
      });
    }

    // クイズを開始
    function startQuiz(lesson) {
      alert(`レッスン「${lesson.name}」のクイズを開始します！`);
    }

    // 回答を送信
    async function submitAnswer(name, word_id, chosen) {
      const result = await saveAnswer(name, word_id, chosen);
      if (result.ok) {
        alert("回答が保存されました！");
      } else {
        alert("回答の保存に失敗しました。");
      }
    }

    // イベントリスナー
    btnStart.addEventListener("click", startFlow);

  </script>
</head>
<body>

  <div id="studentSec">
    <input id="stuName" placeholder="名前を入力" />
    <button id="btnStart">スタート</button>
    <div id="stuStatus"></div>
    <div id="lessonListBox" style="display:none;"></div>
  </div>

</body>
</html>
