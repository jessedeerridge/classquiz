<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Word Study Admin</title>
  <style>
    body{ font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; margin:0; background:#f6f7fb; color:#111; }
    .wrap{ max-width:1100px; margin:0 auto; padding:24px; }
    .card{ background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:14px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.06); }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } }
    input, button{ font:inherit; }
    input{ padding:10px 12px; border-radius:10px; border:1px solid rgba(0,0,0,.18); width:100%; }
    button{ padding:10px 12px; border-radius:10px; border:1px solid rgba(0,0,0,.18); background:#111; color:#fff; cursor:pointer; }
    button.secondary{ background:#fff; color:#111; }
    button.ghost{ background:transparent; color:#111; }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    h1{ margin:0 0 12px; font-size:22px; }
    h2{ margin:0 0 10px; font-size:16px; }
    .muted{ opacity:.7; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .list{ display:grid; gap:10px; margin-top:10px; }
    .item{ display:flex; justify-content:space-between; gap:10px; align-items:center; padding:12px; border:1px solid rgba(0,0,0,.10); border-radius:12px; }
    .small{ font-size:12px; }
    code{ background:rgba(0,0,0,.06); padding:2px 6px; border-radius:8px; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ border-bottom:1px solid rgba(0,0,0,.08); padding:8px; text-align:left; vertical-align:top; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>先生用 管理画面（Realtime Database）</h1>
      <div class="row small muted">
        <div>あなたのUID: <code id="uidText">...</code></div>
        <div>状態: <span id="statusText">初期化中...</span></div>
      </div>
      <div class="small muted" style="margin-top:8px;">
        ✅ 初回はこのUIDをRealtime DBの <code>admins/&lt;UID&gt; = true</code> に手動追加してください（Consoleから追加OK）。<br>
        そうするとこの画面で「単語編集」「学生一覧」が見れるようになります。
      </div>
    </div>

    <div style="height:14px;"></div>

    <div class="grid">
      <div class="card">
        <h2>単語の追加</h2>
        <div class="row">
          <div style="flex:1; min-width:200px;">
            <div class="small muted">単語（text）</div>
            <input id="wordText" placeholder="例：apple" />
          </div>
          <div style="flex:1; min-width:200px;">
            <div class="small muted">意味（meaning）</div>
            <input id="wordMeaning" placeholder="例：りんご" />
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="addBtn">追加</button>
          <button class="secondary" id="seedBtn">サンプル単語を追加</button>
        </div>

        <div style="margin-top:14px;">
          <h2 style="margin-bottom:6px;">単語一覧</h2>
          <div class="list" id="wordList"></div>
        </div>
      </div>

      <div class="card">
        <h2>学生一覧（クリックで進捗を見る）</h2>
        <div class="small muted">保存先：<code>students</code> と <code>progress</code></div>
        <div style="margin-top:10px; overflow:auto;">
          <table>
            <thead>
              <tr>
                <th>UID</th>
                <th>名前</th>
                <th>進捗</th>
              </tr>
            </thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>

        <div style="margin-top:14px;">
          <h2 style="margin-bottom:6px;">選択中の学生の詳細</h2>
          <div class="small muted" id="pickedText">未選択</div>
          <div class="list" id="pickedProgress"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import {
      getDatabase, ref, get, set, update, remove, onValue, push, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARne6Jb4ePPe7vbvLryE_P-jZ2umI3LFc",
      authDomain: "kakapo-8d297.firebaseapp.com",
      databaseURL: "https://kakapo-8d297-default-rtdb.firebaseio.com",
      projectId: "kakapo-8d297",
      storageBucket: "kakapo-8d297.firebasestorage.app",
      messagingSenderId: "702767130857",
      appId: "1:702767130857:web:54472c8d5ea09bd3cf6878",
      measurementId: "G-NXSRP1T826"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const uidText = document.getElementById("uidText");
    const statusText = document.getElementById("statusText");
    const wordText = document.getElementById("wordText");
    const wordMeaning = document.getElementById("wordMeaning");
    const addBtn = document.getElementById("addBtn");
    const seedBtn = document.getElementById("seedBtn");
    const wordList = document.getElementById("wordList");
    const studentTable = document.getElementById("studentTable");
    const pickedText = document.getElementById("pickedText");
    const pickedProgress = document.getElementById("pickedProgress");

    let uid = null;
    let wordsMap = {};
    let studentsMap = {};
    let pickedUid = null;

    function setStatus(t){ statusText.textContent = t; }

    setStatus("匿名ログイン中...");
    signInAnonymously(auth).catch(err => {
      console.error(err);
      setStatus("ログイン失敗: " + err.code);
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      uid = user.uid;
      uidText.textContent = uid;
      setStatus("ログインOK（admins登録されていれば閲覧できます）");

      subscribeWords();
      subscribeStudents();
    });

    // ========= Words =========
    function subscribeWords(){
      onValue(ref(db, "words"), (snap) => {
        wordsMap = snap.exists() ? (snap.val() || {}) : {};
        renderWords();
        renderStudents(); // 進捗表示に総単語数が要るので再描画
      });
    }

    addBtn.addEventListener("click", async () => {
      const t = (wordText.value || "").trim();
      const m = (wordMeaning.value || "").trim();
      if (!t){ alert("単語を入れて"); return; }

      addBtn.disabled = true;
      try{
        const newRef = push(ref(db, "words"));
        await set(newRef, { text: t, meaning: m, createdAt: serverTimestamp() });
        wordText.value = "";
        wordMeaning.value = "";
      } catch(e){
        console.error(e);
        alert("追加失敗: " + (e?.code || e));
      } finally{
        addBtn.disabled = false;
      }
    });

    seedBtn.addEventListener("click", async () => {
      const samples = [
        { text:"apple", meaning:"りんご" },
        { text:"banana", meaning:"バナナ" },
        { text:"book", meaning:"本" },
        { text:"study", meaning:"勉強する" },
        { text:"teacher", meaning:"先生" },
      ];
      try{
        for (const s of samples){
          const r = push(ref(db, "words"));
          await set(r, { ...s, createdAt: serverTimestamp() });
        }
        alert("サンプルを追加しました");
      } catch(e){
        console.error(e);
        alert("サンプル追加失敗: " + (e?.code || e));
      }
    });

    function renderWords(){
      const ids = Object.keys(wordsMap || {});
      if (ids.length === 0){
        wordList.innerHTML = `<div class="item"><div><b>単語なし</b><div class="small muted">上で追加してね</div></div></div>`;
        return;
      }
      wordList.innerHTML = "";
      ids.sort((a,b)=> String(a).localeCompare(String(b), "ja"));
      for (const id of ids){
        const w = wordsMap[id] || {};
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div style="min-width:0;">
            <div style="font-weight:700;">${esc(w.text ?? id)}</div>
            <div class="small muted">${w.meaning ? esc(w.meaning) : "（意味なし）"}</div>
            <div class="small muted">id: <code>${id}</code></div>
          </div>
          <div class="row">
            <button class="secondary" data-act="del">削除</button>
          </div>
        `;
        el.querySelector('[data-act="del"]').addEventListener("click", async () => {
          if (!confirm("削除しますか？")) return;
          try{
            await remove(ref(db, `words/${id}`));
          } catch(e){
            console.error(e);
            alert("削除失敗: " + (e?.code || e));
          }
        });
        wordList.appendChild(el);
      }
    }

    // ========= Students =========
    function subscribeStudents(){
      onValue(ref(db, "students"), (snap) => {
        studentsMap = snap.exists() ? (snap.val() || {}) : {};
        renderStudents();
      }, (err) => {
        console.error(err);
        setStatus("students購読失敗: " + err.code);
      });
    }

    async function countLearnedForStudent(stUid){
      try{
        const snap = await get(ref(db, `progress/${stUid}`));
        const prog = snap.exists() ? (snap.val() || {}) : {};
        const wordIds = Object.keys(wordsMap || {});
        let learned = 0;
        for (const wid of wordIds){
          if (prog?.[wid]?.learned) learned++;
        }
        return { learned, total: wordIds.length };
      } catch(e){
        return { learned: 0, total: Object.keys(wordsMap||{}).length };
      }
    }

    async function renderStudents(){
      const uids = Object.keys(studentsMap || {});
      studentTable.innerHTML = "";
      if (uids.length === 0){
        studentTable.innerHTML = `<tr><td colspan="3" class="muted">学生なし</td></tr>`;
        return;
      }
      uids.sort((a,b)=> String(a).localeCompare(String(b), "ja"));
      for (const stUid of uids){
        const st = studentsMap[stUid] || {};
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><code>${stUid}</code></td>
          <td>${esc(st.name || "(未設定)")}</td>
          <td class="muted">読み込み中...</td>
        `;
        tr.style.cursor = "pointer";
        tr.addEventListener("click", () => pickStudent(stUid));
        studentTable.appendChild(tr);

        // 進捗数を非同期で埋める
        const { learned, total } = await countLearnedForStudent(stUid);
        tr.children[2].textContent = `${learned}/${total}`;
      }
    }

    async function pickStudent(stUid){
      pickedUid = stUid;
      const st = studentsMap?.[stUid] || {};
      pickedText.innerHTML = `UID: <code>${stUid}</code> / 名前: <b>${esc(st.name || "(未設定)")}</b>`;
      pickedProgress.innerHTML = `<div class="item"><div class="muted">読み込み中...</div></div>`;

      try{
        const snap = await get(ref(db, `progress/${stUid}`));
        const prog = snap.exists() ? (snap.val() || {}) : {};
        const wordIds = Object.keys(wordsMap || {}).sort((a,b)=> String(a).localeCompare(String(b), "ja"));
        if (wordIds.length === 0){
          pickedProgress.innerHTML = `<div class="item"><div><b>wordsが空</b></div></div>`;
          return;
        }
        pickedProgress.innerHTML = "";
        for (const wid of wordIds){
          const w = wordsMap[wid] || {};
          const learned = !!prog?.[wid]?.learned;
          const el = document.createElement("div");
          el.className = "item";
          el.innerHTML = `
            <div>
              <div style="font-weight:700;">${esc(w.text ?? wid)} <span class="muted small">(${learned ? "覚えた" : "未"})</span></div>
              <div class="small muted">${w.meaning ? esc(w.meaning) : ""}</div>
            </div>
          `;
          pickedProgress.appendChild(el);
        }
      } catch(e){
        console.error(e);
        pickedProgress.innerHTML = `<div class="item"><div class="muted">読み込み失敗: ${esc(e?.code || e)}</div></div>`;
      }
    }

    function esc(s){
      return String(s).replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }
  </script>
</body>
</html>
